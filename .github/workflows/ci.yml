name: FluxQueue CI

on:
  push:
    branches:
      - master
      - release
      - develop
  pull_request:
    branches:
      - master
      - release
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libc6 libgcc-s1 libstdc++6 zlib1g libunwind8

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: fluxqueue:ci

      - name: Smoke test container startup
        run: |
          docker run -d --name fluxqueue-test \
            -p 8080:8080 \
            -p 5672:5672 \
            fluxqueue:ci

          sleep 10
          docker ps
          docker logs fluxqueue-test || true
          docker rm -f fluxqueue-test
