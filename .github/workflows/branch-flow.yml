name: Branch Flow Validation

on:
  pull_request:
    branches:
      - release
      - master

jobs:
  validate-branch-flow:
    name: Validate Branch Flow
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch source
        run: |
          echo "Base: ${{ github.base_ref }}"
          echo "Head: ${{ github.head_ref }}"

          if [ "${{ github.base_ref }}" = "release" ] && [ "${{ github.head_ref }}" != "develop" ]; then
            echo "Only develop may merge into release"
            exit 1
          fi

          if [ "${{ github.base_ref }}" = "master" ] && [ "${{ github.head_ref }}" != "release" ]; then
            echo "Only release may merge into master"
            exit 1
          fi
