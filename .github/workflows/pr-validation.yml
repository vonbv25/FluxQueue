name: FluxQueue PR Validation

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    name: Build and Run Unit Tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build test container
        run: |
          docker build \
            --cache-from fluxqueue-test \
            -f Dockerfile.test \
            -t fluxqueue-test .

      - name: Run unit tests inside container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            fluxqueue-test \
            bash -c "
              dotnet restore &&
              dotnet build --configuration Release &&
              dotnet test unit-tests/FluxQueue.Core.Test/FluxQueue.Core.Test.csproj \
                --configuration Release \
                --no-build \
                --verbosity normal
            "

  integration-tests:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Run Integration Tests (master only)
    needs: unit-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build test container
        run: |
          docker build \
            --cache-from fluxqueue-test \
            -f Dockerfile.test \
            -t fluxqueue-test .

      - name: Run integration tests inside container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            fluxqueue-test \
            bash -c "
              dotnet restore &&
              dotnet build --configuration Release &&
              dotnet test integration-tests/FluxQueue.IntegrationTests/FluxQueue.IntegrationTests.csproj \
                --configuration Release \
                --no-build \
                --verbosity normal
            "
