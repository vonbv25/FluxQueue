name: FluxQueue PR Validation

on:
  push:
    branches:
      - master
      - release
      - develop
  pull_request:
    branches:
      - master
      - release
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build test container
        run: |
          docker build \
            --cache-from fluxqueue-test \
            -f Dockerfile.test \
            -t fluxqueue-test .

      - name: Run unit tests inside container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            fluxqueue-test \
            bash -c "
              dotnet restore &&
              dotnet build --configuration Release &&
              dotnet test unit-tests/FluxQueue.Core.Test/FluxQueue.Core.Test.csproj \
                --configuration Release \
                --no-build \
                --verbosity normal
            "
