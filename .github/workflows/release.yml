name: FluxQueue Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build test container
        run: |
          docker build -f Dockerfile.test -t fluxqueue-test .

      - name: Build solution and run unit tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            fluxqueue-test \
            bash -c "
              dotnet restore &&
              dotnet build --configuration Release &&
              dotnet test unit-tests/FluxQueue.Core.Test/FluxQueue.Core.Test.csproj \
                --configuration Release \
                --no-build \
                --verbosity normal
            "

      - name: Run integration tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            fluxqueue-test \
            bash -c "
              dotnet test integration-tests/FluxQueue.IntegrationTests/FluxQueue.IntegrationTests.csproj \
                --configuration Release \
                --no-build \
                --verbosity normal
            "

  publish-docker:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: validate-release
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Normalize image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:latest
