syntax = "proto3";

option csharp_namespace = "FluxQueue.Broker";

package fluxqueue;

service QueueBroker {
  rpc Send (SendGrpcRequest) returns (SendGrpcResponse);
  rpc Receive (ReceiveGrpcRequest) returns (ReceiveGrpcResponse);
  rpc Ack (AckGrpcRequest) returns (AckGrpcResponse);
  rpc Reject (RejectGrpcRequest) returns (RejectGrpcResponse);
}

message SendGrpcRequest {
  string queue = 1;
  bytes payload = 2;
  int32 delaySeconds = 3;
  int32 maxReceiveCount = 4;
}

message SendGrpcResponse {
  string messageId = 1;
}

message ReceiveGrpcRequest {
  string queue = 1;
  int32 maxMessages = 2;
  int32 visibilityTimeoutSeconds = 3;
  int32 waitSeconds = 4;
}

message ReceivedGrpcMessage {
  string messageId = 1;
  bytes payload = 2;
  string receiptHandle = 3;
  int32 receiveCount = 4;
}

message ReceiveGrpcResponse {
  repeated ReceivedGrpcMessage messages = 1;
}

message AckGrpcRequest {
  string queue = 1;
  string receiptHandle = 2;
}

message AckGrpcResponse {
  bool acknowledged = 1;
}

message RejectGrpcRequest {
  string queue = 1;
  string receiptHandle = 2;
  string reason = 3;
}

message RejectGrpcResponse {
  bool rejected = 1;
}